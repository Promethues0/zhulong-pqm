# 烛龙 PQM —— 前端静态资源 + 后端 API 反向代理
# 放置到 /etc/nginx/conf.d/zhulong-pqm.conf
server {
    listen 80;
    server_name _;            # 按需改为实际域名/IP

    root /opt/zhulong-pqm/web;
    index index.html;

    # 允许 CBOM / SBOM / PEM 证书上传
    client_max_body_size 16m;

    # SPA 前端：未命中静态文件时回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理（后端监听 127.0.0.1:8099）
    location /api/ {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;     # 扫描/复算等长任务
    }

    # 静态资源缓存（带 hash 的构建产物）
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

